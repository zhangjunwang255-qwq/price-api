<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>铂金 & 钯金 实时行情</title>
  <style>
    :root {
      --bg:       #0f1117;
      --card:     #1a1d27;
      --border:   #2d3148;
      --text:     #e2e4ea;
      --muted:    #6b7280;
      --pt-color: #f59e0b;
      --pd-color: #818cf8;
      --up:       #22c55e;
      --dn:       #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; overflow-x: hidden; }
    html { overflow: hidden; }
    body {
      font-family: "SF Mono", "Fira Code", monospace;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 1.5rem 1rem;
      overflow: hidden;
    }
    header { text-align: center; margin-bottom: 1.5rem; }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.05em; }
    header .subtitle { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }
    .view {
      max-width: 960px; margin: 0 auto;
      overflow: hidden;
    }

    /* 价格卡片 */
    .grid-2 {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;
      max-width: 100%;
    }
    @media (max-width: 500px) { .grid-2 { grid-template-columns: 1fr; } }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 1.2rem 1.4rem;
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
    .card-title { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
    .card-symbol { font-size: 0.65rem; color: var(--muted); background: var(--bg); padding: 0.2rem 0.45rem; border-radius: 4px; }
    .price { font-size: 2.2rem; font-weight: 700; line-height: 1; margin-bottom: 0.25rem; }
    .price.pt { color: var(--pt-color); }
    .price.pd { color: var(--pd-color); }
    .unit { font-size: 0.8rem; color: var(--muted); font-weight: 400; }
    .meta { font-size: 0.68rem; color: var(--muted); margin-top: 0.3rem; }
    .meta span { color: var(--text); }
    .change-tag {
      font-size: 0.78rem; font-weight: 600; padding: 0.18rem 0.5rem; border-radius: 5px;
      display: inline-block; margin-top: 0.4rem;
    }
    .change-tag.up   { color: var(--up);   background: rgba(34,197,94,0.12); }
    .change-tag.dn   { color: var(--dn);   background: rgba(239,68,68,0.12); }
    .change-tag.flat { color: var(--muted); background: rgba(107,114,128,0.12); }
    .session-tag {
      font-size: 0.68rem; font-weight: 600; padding: .18rem .5rem; border-radius: 5px;
      display: inline-block; margin-top: 0.4rem;
    }
    .session-tag.live   { color: var(--up); background: rgba(34,197,94,0.12); }
    .session-tag.closed { color: var(--dn); background: rgba(239,68,68,0.12); }

    /* 图表卡片 */
    .chart-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem 1.2rem; margin-bottom: 1rem;
      overflow: hidden;
    }
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.7rem; }
    .chart-title { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    .chart-count { font-size: 0.62rem; color: var(--muted); }
    /* 竞标图：两张并排 */
    .jb-charts-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
      width: 100%; max-width: 100%;
    }
    @media (max-width: 640px) { .jb-charts-grid { grid-template-columns: 1fr; } }
    .jb-chart-wrap { width: 100%; overflow: hidden; }
    .jb-chart { width: 100% !important; height: 200px !important; }
    @media (min-width: 960px) { .jb-chart { height: 240px !important; } }

    /* 模式切换 */
    .mode-interval { font-size: 0.68rem; color: var(--muted); text-align: center; margin-bottom: 0.4rem; }
    .mode-bar { display: flex; justify-content: center; gap: 0.4rem; margin-bottom: 1.5rem; }
    .mode-btn {
      font-family: inherit; font-size: 0.72rem; font-weight: 600;
      padding: 0.45rem 0.9rem; border: 1px solid var(--border);
      border-radius: 6px; background: var(--card); color: var(--muted);
      cursor: pointer; transition: all 0.2s;
    }
    .mode-btn:hover { border-color: var(--text); color: var(--text); }
    .mode-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* 状态栏 */
    .status-bar {
      max-width: 960px; margin: 1.2rem auto 0;
      display: flex; justify-content: space-between;
      font-size: 0.68rem; color: var(--muted);
    }
    .status-dot {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; margin-right: 4px; vertical-align: middle;
    }
    .status-dot.live { background: var(--up); box-shadow: 0 0 6px var(--up); animation: pulse 2s infinite; }
    .status-dot.err  { background: var(--dn); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    #richang-view { display: none; }
  </style>
</head>
<body>

<header>
  <h1>铂金 · 钯金 实时行情</h1>
  <div class="subtitle">GFEX · KQ.m@GFEX.pt · KQ.m@GFEX.pd</div>
</header>

<div class="mode-interval" id="mode-interval"></div>
<div class="mode-bar">
  <button class="mode-btn active" id="btn-jingbiao" onclick="setMode('竞标')">竞标模式</button>
  <button class="mode-btn"        id="btn-richang"  onclick="setMode('日常')">日常模式</button>
</div>

<!-- ══ 竞标模式 ══════════════════════════════════════ -->
<div id="jingbiao-view" class="view">
  <div class="grid-2">
    <div class="card">
      <div class="card-header">
        <span class="card-title">铂金 Platinum</span>
        <span class="card-symbol">GFEX.pt</span>
      </div>
      <div class="price pt" id="pt-price">--<span class="unit"> 元/克</span></div>
      <div class="meta">涨跌: <span id="pt-change">--</span></div>
      <div class="meta">成交量: <span id="pt-vol">--</span></div>
      <div id="pt-change-tag" class="change-tag flat">--</div>
      <div id="pt-session" class="session-tag closed" style="margin-top:.3rem">加载中</div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">钯金 Palladium</span>
        <span class="card-symbol">GFEX.pd</span>
      </div>
      <div class="price pd" id="pd-price">--<span class="unit"> 元/克</span></div>
      <div class="meta">涨跌: <span id="pd-change">--</span></div>
      <div class="meta">成交量: <span id="pd-vol">--</span></div>
      <div id="pd-change-tag" class="change-tag flat">--</div>
      <div id="pd-session" class="session-tag closed" style="margin-top:.3rem">加载中</div>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-header">
      <span class="chart-title">实时走势</span>
      <span class="chart-count" id="jb-count">0 条</span>
    </div>
    <div class="jb-charts-grid">
      <div class="jb-chart-wrap"><canvas id="jb-pt-chart"></canvas></div>
      <div class="jb-chart-wrap"><canvas id="jb-pd-chart"></canvas></div>
    </div>
  </div>
</div>

<!-- ══ 日常模式 ══════════════════════════════════════ -->
<div id="richang-view" class="view">
  <div class="grid-2">
    <div class="card">
      <div class="card-header">
        <span class="card-title">铂金 Platinum</span>
        <span class="card-symbol">GFEX.pt</span>
      </div>
      <div class="price pt" id="r-pt-price">--<span class="unit"> 元/克</span></div>
      <div class="meta">涨跌: <span id="r-pt-change">--</span></div>
      <div class="meta">成交量: <span id="r-pt-vol">--</span></div>
      <div id="r-pt-change-tag" class="change-tag flat">--</div>
      <div id="r-pt-session" class="session-tag closed" style="margin-top:.3rem">加载中</div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">钯金 Palladium</span>
        <span class="card-symbol">GFEX.pd</span>
      </div>
      <div class="price pd" id="r-pd-price">--<span class="unit"> 元/克</span></div>
      <div class="meta">涨跌: <span id="r-pd-change">--</span></div>
      <div class="meta">成交量: <span id="r-pd-vol">--</span></div>
      <div id="r-pd-change-tag" class="change-tag flat">--</div>
      <div id="r-pd-session" class="session-tag closed" style="margin-top:.3rem">加载中</div>
    </div>
  </div>
</div>

<div class="status-bar">
  <span id="status-text"><span class="status-dot live"></span>连接中...</span>
  <span id="last-update">--</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const API    = window.location.origin;
const MAX_JB  = 80;

// ── 工具 ──────────────────────────────────────────
function fmt2(v)   { return (v == null || isNaN(v)) ? "--" : Number(v).toFixed(2); }
function fmtVol(v) { return v ? Number(v).toLocaleString() : "--"; }
function ts(now) {
  return `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;
}

// ── 竞标模式：内存缓冲 + 两张独立图 ───
const jbBuf = [];   // [{t, pt, pd}]
let jbPtChart = null;
let jbPdChart = null;

function createChartOpts(label, color) {
  return {
    type: "line",
    data: {
      labels: [],
      datasets: [{
        label,
        data: [],
        borderColor: color,
        backgroundColor: color.replace(')', ',0.08)').replace('rgb', 'rgba'),
        fill: false,
        tension: 0.35,
        borderWidth: 1.8,
        pointRadius: 0,
        spanGaps: true,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: "index", intersect: false },
      scales: {
        x: {
          grid: { color: "rgba(45,49,72,0.5)" },
          ticks: {
            color: "#6b7280",
            maxTicksLimit: 6,
            maxRotation: 0,
            font: { size: 9 },
          },
        },
        y: {
          grid: { color: "rgba(45,49,72,0.5)" },
          ticks: {
            color: "#6b7280",
            font: { size: 9 },
            callback: v => v.toFixed(2),
          },
        },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#1a1d27",
          borderColor: "#2d3148",
          borderWidth: 1,
          titleColor: "#e2e4ea",
          bodyColor: "#9ca3af",
        },
      },
    },
  };
}

function initJbCharts() {
  jbPtChart = new Chart(
    document.getElementById("jb-pt-chart").getContext("2d"),
    createChartOpts("铂金 PT", "#f59e0b")
  );
  jbPdChart = new Chart(
    document.getElementById("jb-pd-chart").getContext("2d"),
    createChartOpts("钯金 PD", "#818cf8")
  );
}

// ── 价格卡片更新 ─────────────────────────────────
function updatePriceCard(prefix, id, q) {
  const c = q.change || 0;
  document.getElementById(`${prefix}${id}-price`).innerHTML = `${fmt2(q.price)}<span class="unit"> 元/克</span>`;
  document.getElementById(`${prefix}${id}-change`).textContent = fmt2(c);
  document.getElementById(`${prefix}${id}-vol`).textContent = fmtVol(q.volume);
  const ctag = document.getElementById(`${prefix}${id}-change-tag`);
  ctag.className = "change-tag " + (c > 0 ? "up" : c < 0 ? "dn" : "flat");
  ctag.textContent = (c > 0 ? "+" : "") + fmt2(c);
  const stag = document.getElementById(`${prefix}${id}-session`);
  stag.className = "session-tag " + (q.is_trading ? "live" : "closed");
  stag.textContent = q.is_trading ? "● 交易中" : "○ 非交易时段";
}

// ── 轮询 ─────────────────────────────────────────
let jingbiaoTimer     = null;
let richangPriceTimer = null;

async function fetchQuote() {
  const res = await fetch(`${API}/quote`, { signal: AbortSignal.timeout(5000) });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return (await res.json()).data || {};
}

async function pollJingbiao() {
  try {
    const data = await fetchQuote();
    const now  = new Date();
    const t    = ts(now);

    let ptPrice = null, pdPrice = null;
    for (const sym of ["KQ.m@GFEX.pt", "KQ.m@GFEX.pd"]) {
      const q = data[sym]; if (!q) continue;
      const id = sym.includes(".pt") ? "pt" : "pd";
      updatePriceCard("", id, q);
      if (id === "pt") ptPrice = q.price;
      else             pdPrice = q.price;
    }

    // 追加到缓冲
    if (ptPrice != null || pdPrice != null) {
      jbBuf.push({ t: now, pt: ptPrice, pd: pdPrice });
      if (jbBuf.length > MAX_JB) jbBuf.shift();

      if (!jbPtChart) initJbCharts();

      const labels = jbBuf.map(b => ts(b.t));
      jbPtChart.data.labels = labels;
      jbPtChart.data.datasets[0].data = jbBuf.map(b => b.pt);
      jbPtChart.update("none");

      jbPdChart.data.labels = labels;
      jbPdChart.data.datasets[0].data = jbBuf.map(b => b.pd);
      jbPdChart.update("none");

      document.getElementById("jb-count").textContent = `${jbBuf.length} 条`;
    }

    document.getElementById("status-text").innerHTML = '<span class="status-dot live"></span>已连接';
    document.getElementById("last-update").textContent = "更新: " + t;
  } catch (e) {
    document.getElementById("status-text").innerHTML = '<span class="status-dot err"></span>连接异常 ' + e.message;
  }
  jingbiaoTimer = setTimeout(pollJingbiao, 2000);
}

async function pollRichangPrice() {
  try {
    const data = await fetchQuote();
    const now  = new Date();
    const t    = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
    for (const sym of ["KQ.m@GFEX.pt", "KQ.m@GFEX.pd"]) {
      const q = data[sym]; if (!q) continue;
      const id = sym.includes(".pt") ? "pt" : "pd";
      updatePriceCard("r-", id, q);
    }
    document.getElementById("status-text").innerHTML = '<span class="status-dot live"></span>已连接';
    document.getElementById("last-update").textContent = "价格更新: " + t;
  } catch (e) {
    document.getElementById("status-text").innerHTML = '<span class="status-dot err"></span>连接异常 ' + e.message;
  }
  richangPriceTimer = setTimeout(pollRichangPrice, 5 * 60 * 1000);
}

// ── 模式切换 ─────────────────────────────────────
async function fetchMode() {
  try {
    const res  = await fetch(`${API}/mode`);
    const json = await res.json();
    const mode = json.mode || "竞标";

    document.getElementById("mode-interval").textContent =
      mode === "竞标"
        ? "价格每 2 秒实时更新 · 内存缓冲走势"
        : `价格每 5 分钟更新 · 历史数据每 ${json.interval / 60} 分钟入库`;
    document.getElementById("btn-jingbiao").className = "mode-btn" + (mode === "竞标" ? " active" : "");
    document.getElementById("btn-richang").className  = "mode-btn" + (mode === "日常"  ? " active" : "");

    if (mode === "日常") {
      document.getElementById("jingbiao-view").style.display = "none";
      document.getElementById("richang-view").style.display  = "block";
      clearTimeout(jingbiaoTimer);
      pollRichangPrice();
    } else {
      document.getElementById("jingbiao-view").style.display = "block";
      document.getElementById("richang-view").style.display  = "none";
      clearTimeout(richangPriceTimer);
      pollJingbiao();
    }
  } catch (e) {
    console.error("fetchMode 失败:", e);
  }
}

async function setMode(mode) {
  try {
    const fd = new FormData();
    fd.append("mode", mode);
    const res  = await fetch(`${API}/mode`, { method: "POST", body: fd });
    const json = await res.json();
    if (json.ok) {
      clearTimeout(jingbiaoTimer);
      clearTimeout(richangPriceTimer);
      fetchMode();
    } else {
      alert("切换失败: " + json.error);
    }
  } catch (e) {
    alert("切换失败: " + e.message);
  }
}

fetchMode();
</script>
</body>
</html>
