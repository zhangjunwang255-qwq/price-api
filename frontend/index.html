<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>铂金 & 钯金 实时行情</title>
  <style>
    :root {
      --bg:       #0f1117;
      --card:     #1a1d27;
      --border:   #2d3148;
      --text:     #e2e4ea;
      --muted:    #6b7280;
      --pt-color: #f59e0b;
      --pd-color: #818cf8;
      --up:       #22c55e;
      --dn:       #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "SF Mono", "Fira Code", monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    header .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    /* ── 竞标模式布局 ──────────────────────── */
    #jingbiao-view {
      max-width: 900px;
      margin: 0 auto;
    }

    /* 价格卡片 */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 500px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.2rem 1.4rem;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
    }

    .card-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .card-symbol {
      font-size: 0.65rem;
      color: var(--muted);
      background: var(--bg);
      padding: 0.2rem 0.45rem;
      border-radius: 4px;
    }

    .price {
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    .price.pt { color: var(--pt-color); }
    .price.pd { color: var(--pd-color); }

    .unit { font-size: 0.8rem; color: var(--muted); font-weight: 400; }

    .meta { font-size: 0.68rem; color: var(--muted); margin-top: 0.3rem; }
    .meta span { color: var(--text); }

    .change-tag {
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.18rem 0.5rem;
      border-radius: 5px;
      display: inline-block;
      margin-top: 0.4rem;
    }

    .change-tag.up   { color: var(--up); background: rgba(34,197,94,0.12); }
    .change-tag.dn   { color: var(--dn); background: rgba(239,68,68,0.12); }
    .change-tag.flat { color: var(--muted); background: rgba(107,114,128,0.12); }

    .session-tag {
      font-size: 0.68rem;
      font-weight: 600;
      padding: .18rem .5rem;
      border-radius: 5px;
      display: inline-block;
      margin-top: 0.4rem;
    }

    .session-tag.live   { color: var(--up); background: rgba(34,197,94,0.12); }
    .session-tag.closed { color: var(--dn); background: rgba(239,68,68,0.12); }

    /* ── 竞标模式 K 线图 ────────────────────── */
    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      margin-bottom: 1rem;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.7rem;
    }

    .chart-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .chart-canvas {
      width: 100% !important;
      height: 200px !important;
    }

    /* ── 模式切换按钮 ───────────────────────── */
    .mode-interval {
      font-size: 0.68rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .mode-bar {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      margin-bottom: 1.5rem;
    }

    .mode-btn {
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.45rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn:hover { border-color: var(--text); color: var(--text); }
    .mode-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* ── 日常模式三图（默认隐藏）────────────── */
    #richang-view {
      display: none;
    }

    .charts-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .chart-count {
      font-size: 0.62rem;
      color: var(--muted);
    }

    .chart-loading {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.75rem;
    }

    /* ── 状态栏 ─────────────────────────────── */
    .status-bar {
      max-width: 900px;
      margin: 1.2rem auto 0;
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      color: var(--muted);
    }

    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    .status-dot.live { background: var(--up); box-shadow: 0 0 6px var(--up); animation: pulse 2s infinite; }
    .status-dot.err  { background: var(--dn); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <header>
    <h1>铂金 · 钯金 实时行情</h1>
    <div class="subtitle">GFEX · KQ.m@GFEX.pt · KQ.m@GFEX.pd</div>
  </header>

  <!-- 采样模式切换 -->
  <div class="mode-interval" id="mode-interval"></div>
  <div class="mode-bar">
    <button class="mode-btn active" id="btn-jingbiao" onclick="setMode('竞标')">竞标模式</button>
    <button class="mode-btn" id="btn-richang" onclick="setMode('日常')">日常模式</button>
  </div>

  <!-- ══ 竞标模式 ══════════════════════════════════ -->
  <div id="jingbiao-view">

    <!-- 实时价格卡片 -->
    <div class="grid">
      <div class="card">
        <div class="card-header">
          <span class="card-title">铂金 Platinum</span>
          <span class="card-symbol">GFEX.pt</span>
        </div>
        <div class="price pt" id="pt-price">--<span class="unit"> 元/克</span></div>
        <div class="meta">涨跌: <span id="pt-change">--</span></div>
        <div class="meta">成交量: <span id="pt-vol">--</span></div>
        <div id="pt-change-tag" class="change-tag flat">--</div>
        <div id="pt-session" class="session-tag closed" style="margin-top:.3rem">加载中</div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">钯金 Palladium</span>
          <span class="card-symbol">GFEX.pd</span>
        </div>
        <div class="price pd" id="pd-price">--<span class="unit"> 元/克</span></div>
        <div class="meta">涨跌: <span id="pd-change">--</span></div>
        <div class="meta">成交量: <span id="pd-vol">--</span></div>
        <div id="pd-change-tag" class="change-tag flat">--</div>
        <div id="pd-session" class="session-tag closed" style="margin-top:.3rem">加载中</div>
      </div>
    </div>

    <!-- 实时 K 线图（2s 轮询） -->
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">实时走势 · 竞标模式</span>
        <span class="chart-count" id="jingbiao-count">0 条</span>
      </div>
      <canvas id="jingbiao-chart" class="chart-canvas"></canvas>
    </div>
  </div>

  <!-- ══ 日常模式 ══════════════════════════════════ -->
  <div id="richang-view">
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title">📈 5 分钟走势</span>
          <span class="chart-count" id="count-5min">--</span>
        </div>
        <div class="chart-loading" id="loading-5min">加载中...</div>
        <canvas id="chart-5min" class="chart-canvas" style="display:none;height:120px!important"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title">📊 15 分钟走势</span>
          <span class="chart-count" id="count-15min">--</span>
        </div>
        <div class="chart-loading" id="loading-15min">加载中...</div>
        <canvas id="chart-15min" class="chart-canvas" style="display:none;height:120px!important"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title">📉 1 小时走势</span>
          <span class="chart-count" id="count-1hour">--</span>
        </div>
        <div class="chart-loading" id="loading-1hour">加载中...</div>
        <canvas id="chart-1hour" class="chart-canvas" style="display:none;height:120px!important"></canvas>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span id="status-text"><span class="status-dot live"></span>连接中...</span>
    <span id="last-update">--</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    const API = window.location.origin;
    const SYMBOLS = ["KQ.m@GFEX.pt", "KQ.m@GFEX.pd"];

    // ── 竞标模式实时 K 线图 ───────────────────────────
    const MAX_PTS = 80;  // 内存里最多存几条
    const jingbiao_buf = [];  // [{t, pt, pd}]

    let jingbiaoChart = null;

    function initJingbiaoChart() {
      const ctx = document.getElementById("jingbiao-chart").getContext("2d");
      jingbiaoChart = new Chart(ctx, {
        type: "line",
        data: {
          labels: [],
          datasets: [
            {
              label: "铂金 PT",
              data: [],
              borderColor: "#f59e0b",
              backgroundColor: "rgba(245,158,11,0.06)",
              fill: true,
              tension: 0.35,
              borderWidth: 1.5,
              pointRadius: 0,
            },
            {
              label: "钯金 PD",
              data: [],
              borderColor: "#818cf8",
              backgroundColor: "rgba(129,140,248,0.06)",
              fill: true,
              tension: 0.35,
              borderWidth: 1.5,
              pointRadius: 0,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          interaction: { mode: "index", intersect: false },
          scales: {
            x: {
              grid: { color: "rgba(45,49,72,0.5)" },
              ticks: {
                color: "#6b7280",
                maxTicksLimit: 8,
                font: { size: 10 },
                maxRotation: 0,
              },
            },
            y: {
              grid: { color: "rgba(45,49,72,0.5)" },
              ticks: {
                color: "#6b7280",
                font: { size: 10 },
                callback: v => v.toFixed(1),
              },
            },
          },
          plugins: {
            legend: {
              display: true,
              labels: { color: "#9ca3af", font: { size: 11 } },
            },
            tooltip: {
              backgroundColor: "#1a1d27",
              borderColor: "#2d3148",
              borderWidth: 1,
              titleColor: "#e2e4ea",
              bodyColor: "#9ca3af",
            },
          },
        },
      });
    }

    // ── 日常模式历史图表 ─────────────────────────────
    function makeHistoryChart(ctx, label, borderColor) {
      return new Chart(ctx, {
        type: "line",
        data: {
          labels: [],
          datasets: [
            { label: "铂金 PT", data: [], borderColor: "#f59e0b",
              backgroundColor: "rgba(245,158,11,0.06)", fill: true,
              tension: 0.35, borderWidth: 1.5, pointRadius: 0 },
            { label: "钯金 PD", data: [], borderColor: "#818cf8",
              backgroundColor: "rgba(129,140,248,0.06)", fill: true,
              tension: 0.35, borderWidth: 1.5, pointRadius: 0 },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          interaction: { mode: "index", intersect: false },
          scales: {
            x: { grid: { color: "rgba(45,49,72,0.5)" },
                ticks: { color: "#6b7280", maxTicksLimit: 6, font: { size: 10 }, maxRotation: 0 } },
            y: { grid: { color: "rgba(45,49,72,0.5)" },
                ticks: { color: "#6b7280", font: { size: 10 }, callback: v => v.toFixed(1) } },
          },
          plugins: {
            legend: {
              display: true,
              labels: { color: "#9ca3af", font: { size: 11 } },
            },
            tooltip: { backgroundColor: "#1a1d27", borderColor: "#2d3148", borderWidth: 1,
                       titleColor: "#e2e4ea", bodyColor: "#9ca3af" },
          },
        },
      });
    }

    const historyCharts = {};
    function initHistoryCharts() {
      if (historyCharts["5min"]) return;
      historyCharts["5min"]  = makeHistoryChart(
        document.getElementById("chart-5min").getContext("2d"), "5min", "#f59e0b");
      historyCharts["15min"] = makeHistoryChart(
        document.getElementById("chart-15min").getContext("2d"), "15min", "#818cf8");
      historyCharts["1hour"] = makeHistoryChart(
        document.getElementById("chart-1hour").getContext("2d"), "1hour", "#22c55e");
    }

    // ── 模式切换 ────────────────────────────────────
    async function fetchMode() {
      try {
        const res  = await fetch(`${API}/mode`);
        const json = await res.json();
        const mode = json.mode || "竞标";

        document.getElementById("mode-interval").textContent =
          mode === "竞标" ? "实时数据 · 每 2 秒更新" : `入库间隔 · 每 ${json.interval / 60} 分钟`;

        document.getElementById("btn-jingbiao").className =
          "mode-btn" + (mode === "竞标" ? " active" : "");
        document.getElementById("btn-richang").className =
          "mode-btn" + (mode === "日常" ? " active" : "");

        if (mode === "日常") {
          document.getElementById("jingbiao-view").style.display = "none";
          document.getElementById("richang-view").style.display = "block";
          initHistoryCharts();
          loadAllHistory();
          if (!window._histTimer) {
            window._histTimer = setInterval(loadAllHistory, 5 * 60 * 1000);
          }
        } else {
          document.getElementById("jingbiao-view").style.display = "block";
          document.getElementById("richang-view").style.display = "none";
          if (window._histTimer) {
            clearInterval(window._histTimer);
            window._histTimer = null;
          }
        }
      } catch (e) {
        console.error("fetchMode 失败:", e);
      }
    }

    async function setMode(mode) {
      try {
        const fd = new FormData();
        fd.append("mode", mode);
        const res  = await fetch(`${API}/mode`, { method: "POST", body: fd });
        const json = await res.json();
        if (json.ok) {
          fetchMode();
        } else {
          alert("切换失败: " + json.error);
        }
      } catch (e) {
        alert("切换失败: " + e.message);
      }
    }

    fetchMode();

    // ── 历史数据加载（日常模式）──────────────────────
    async function loadHistory(interval, chartKey, countId) {
      const canvas  = document.getElementById(`chart-${chartKey}`);
      const loading = document.getElementById(`loading-${chartKey}`);
      const c = historyCharts[chartKey];
      if (!c) return;

      try {
        const [ptRes, pdRes] = await Promise.all([
          fetch(`${API}/history?symbol=KQ.m@GFEX.pt&interval_=${interval}&limit=200`),
          fetch(`${API}/history?symbol=KQ.m@GFEX.pd&interval_=${interval}&limit=200`),
        ]);
        const ptRec = (await ptRes.json()).records || [];
        const pdRec = (await pdRes.json()).records || [];

        if (ptRec.length === 0 && pdRec.length === 0) {
          loading.textContent = "暂无数据（请在日常模式下等待数据积累）";
          return;
        }

        const labels = ptRec.map(r => {
          const d = new Date(r.datetime);
          return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
        });

        c.data.labels = labels;
        c.data.datasets[0].data = ptRec.map(r => r.price);
        c.data.datasets[1].data = pdRec.map(r => r.price);

        loading.style.display = "none";
        canvas.style.display  = "block";
        c.update("none");

        document.getElementById(countId).textContent =
          `PT ${ptRec.length} 条 / PD ${pdRec.length} 条`;
      } catch (e) {
        loading.textContent = "加载失败: " + e.message;
      }
    }

    function loadAllHistory() {
      loadHistory("5min",  "5min",  "count-5min");
      loadHistory("15min", "15min", "count-15min");
      loadHistory("1hour", "1hour", "count-1hour");
    }

    // ── 实时轮询（两种模式都用）───────────────────────
    function fmt2(v) {
      if (v == null || isNaN(v)) return "--";
      return Number(v).toFixed(2);
    }

    function fmtVol(v) {
      return v ? Number(v).toLocaleString() : "--";
    }

    async function poll() {
      try {
        const res  = await fetch(`${API}/quote`, { signal: AbortSignal.timeout(5000) });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        const data  = json.data || {};

        const now = new Date();
        const t   = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;

        let ptPrice = null, pdPrice = null;

        SYMBOLS.forEach(sym => {
          const q = data[sym];
          if (!q) return;

          const isPT = sym.includes(".pt");
          const id   = isPT ? "pt" : "pd";
          const p    = fmt2(q.price);

          if (isPT) ptPrice = q.price;
          else       pdPrice = q.price;

          document.getElementById(`${id}-price`).innerHTML =
            `${p}<span class="unit"> 元/克</span>`;
          document.getElementById(`${id}-change`).textContent =
            `${fmt2(q.change)} (${fmt2(q.change_pct)}%)`;
          document.getElementById(`${id}-vol`).textContent = fmtVol(q.volume);

          const ctag = document.getElementById(`${id}-change-tag`);
          const c    = q.change || 0;
          ctag.className = "change-tag " + (c > 0 ? "up" : c < 0 ? "dn" : "flat");
          ctag.textContent = (c > 0 ? "+" : "") + fmt2(q.change_pct) + "%";

          const stag = document.getElementById(`${id}-session`);
          if (q.is_trading) {
            stag.className = "session-tag live";
            stag.textContent = "● 交易中";
          } else {
            stag.className = "session-tag closed";
            stag.textContent = "○ 非交易时段";
          }
        });

        // 竞标模式：追加 K 线图
        if (ptPrice != null || pdPrice != null) {
          jingbiao_buf.push({
            t:   now,
            pt:  ptPrice,
            pd:  pdPrice,
          });
          if (jingbiao_buf.length > MAX_PTS) jingbiao_buf.shift();
          if (!jingbiaoChart) initJingbiaoChart();

          jingbiaoChart.data.labels = jingbiao_buf.map(b =>
            `${String(b.t.getHours()).padStart(2,"0")}:${String(b.t.getMinutes()).padStart(2,"0")}:${String(b.t.getSeconds()).padStart(2,"0")}`
          );
          jingbiaoChart.data.datasets[0].data = jingbiao_buf.map(b => b.pt);
          jingbiaoChart.data.datasets[1].data = jingbiao_buf.map(b => b.pd);
          jingbiaoChart.update("none");

          document.getElementById("jingbiao-count").textContent =
            `${jingbiao_buf.length} 条`;
        }

        document.getElementById("status-text").innerHTML =
          '<span class="status-dot live"></span>已连接';
        document.getElementById("last-update").textContent = "更新: " + t;

      } catch (e) {
        document.getElementById("status-text").innerHTML =
          '<span class="status-dot err"></span>连接异常 ' + e.message;
      }

      setTimeout(poll, 2000);
    }

    poll();
  </script>
</body>
</html>
